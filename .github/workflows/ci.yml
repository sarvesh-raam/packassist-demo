name: CI Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install --no-audit --no-fund

    - name: Run build check
      run: npm run build
      env:
        # Prevent build from failing on environment variable warnings
        VITE_FIREBASE_API_KEY: "dummy_value"
        VITE_FIREBASE_AUTH_DOMAIN: "dummy_value"
        VITE_FIREBASE_PROJECT_ID: "dummy_value"
        VITE_FIREBASE_STORAGE_BUCKET: "dummy_value"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "dummy_value"
        VITE_FIREBASE_APP_ID: "dummy_value"
